{{- if .Values.fluentBit.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "flower.fullname" . }}-fluent-bit
  labels:
    {{- include "flower.labels" . | nindent 4 }}
data:
  fluent-bit.conf: |
    [SERVICE]
        Flush        1
        Daemon       Off
        Log_Level    info
        Parsers_File parsers.conf

    [INPUT]
        Name              tail
        Path              /var/log/containers/*_${POD_NAMESPACE}_flower-app-*.log
        Parser            cri
        Tag               flower.app
        Mem_Buf_Limit     5MB
        Skip_Long_Lines   On
        Refresh_Interval  5
        DB                /tmp/flb_flower_app.db
        DB.Sync           Normal
        Read_from_Head    True

    [FILTER]
        Name          parser
        Match         flower.app
        Key_Name      log
        Parser        flower_app
        Reserve_Data  True
        Preserve_Key  True

    [FILTER]
        Name    grep
        Match   flower.app
        Exclude log ^.*(GET /metrics|GET /health|GET /ready|GET /live).*

    [OUTPUT]
        Name   stdout
        Match  flower.app
        Format json_lines

  parsers.conf: |
    [PARSER]
        Name   cri
        Format regex
        Regex  ^(?<time>[^ ]+) (?<stream>stdout|stderr) (?<flags>[^ ]*) (?<log>.*)$
        Time_Key    time
        Time_Format %Y-%m-%dT%H:%M:%S.%L%z

    [PARSER]
        Name   flower_app
        Format regex
        Regex  ^(?<app_time>\d{4}-\d{2}-\d{2}[T ][^ ]+)\s+-\s+(?<level>[A-Z]+)\s+-\s+(?<message>.*)$
{{- end }}
