apiVersion: v1
kind: Service
metadata:
  name: {{ include "flower.fullname" . }}
  labels:
    {{- include "flower.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: {{ .Values.service.metricsPortName }}
  selector:
    {{- include "flower.selectorLabels" . | nindent 4 }}
