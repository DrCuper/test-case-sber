apiVersion: v2
name: flower
description: Приложение flower с сайдкаром fluentbit и включенным в состав prometheus
type: application
version: 0.1.0
appVersion: "latest"

dependencies:
  - name: kube-prometheus-stack
    alias: prometheus
    version: ">=58.0.0 <80.0.0"
    repository: https://prometheus-community.github.io/helm-charts
    condition: prometheus.enabled
